# AIDHA Configuration Example
# Copy this to .aidha/config.yaml or ~/.config/aidha/config.yaml
# DO NOT COMMIT SECRETS. Use ${VAR} interpolation.

config_version: 1

# Optional: Load environment variables from .env files
env:
  dotenv_files:
    - .env
    - .env.local

default_profile: default

profiles:
  # System-wide baseline
  default:
    llm:
      model: gpt-5-mini
      api_key: ${AIDHA_OPENAI_API_KEY}
      base_url: https://api.openai.com/v1
      reasoning_effort: medium
      verbosity: medium
    db: ./out/aidha.sqlite

  # flagship quality / GPT-5.2
  pro:
    llm:
      model: gpt-5.2
      reasoning_effort: high
      verbosity: high

  # ultra-fast / low cost
  fast:
    llm:
      model: gpt-5-nano
      reasoning_effort: minimal
      verbosity: low

  # Google Gemini 3.1 Pro
  gemini:
    llm:
      model: gemini-3.1-pro
      api_key: ${AIDHA_GOOGLE_API_KEY}
      # Gemini's OpenAI-compatible endpoint
      base_url: https://generativelanguage.googleapis.com/v1beta/openai

  # OpenRouter (Aggregator)
  openrouter:
    llm:
      model: openrouter/google/gemini-pro-1.5
      api_key: ${AIDHA_OPENROUTER_API_KEY}
      base_url: https://openrouter.ai/api/v1

  # Xiaomi Example
  xiaomi:
    llm:
      model: mi-llm-3
      api_key: ${AIDHA_XIAOMI_API_KEY}
      base_url: https://api.xiaomi.ai/v1

  # z.AI Example
  zai:
    llm:
      model: z-pro
      api_key: ${AIDHA_ZAI_API_KEY}
      base_url: https://api.z.ai/v1

# Top-level sources defaults (Tier 3)
sources:
  youtube:
    cookie: ${YOUTUBE_COOKIE}
    innertube_api_key: ${YOUTUBE_INNERTUBE_API_KEY}
    extraction:
      chunk_minutes: 10
      max_claims: 25
