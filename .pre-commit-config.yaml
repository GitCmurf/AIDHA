repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  - repo: local
    hooks:
      - id: docs-catalog
        name: Generate docs catalog
        entry: python docs/_scripts/gen_catalog.py
        language: python
        additional_dependencies:
          - PyYAML
        files: ^docs/.*\.md$
        pass_filenames: false
      - id: docs-validate
        name: Validate docs front matter + version tables + catalog schema
        entry: python docs/_scripts/validate_docs.py
        language: python
        additional_dependencies:
          - PyYAML
          - jsonschema
        files: ^docs/.*\.md$
        pass_filenames: false
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: ["-c", ".markdownlint.json"]
        files: ^(README\.md|docs/.*\.md)$
        exclude: ^docs/_templates/
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args:
          - "--ignore-words=styles/codespell_ignore.txt"
          - "--skip=docs/01-indices/catalog.json,docs/01-indices/linkcheck-report.json,docs/01-indices/package-docs.json,.meminit/meminit.index.json,testdata/youtube_golden/*.json"
  # Vale is optional; enable if installed on developer machines
  - repo: local
    hooks:
      - id: vale
        name: Vale prose lint (optional)
        entry: bash scripts/precommit/vale_optional.sh
        language: system
        types: [markdown]
        additional_dependencies: []
        pass_filenames: true
