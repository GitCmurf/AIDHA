name: TypeScript Packages

on:
  pull_request:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm build:deps

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements-docs.txt

      - name: Lint packages
        run: pnpm lint

      - name: Lint shell scripts
        run: |
          mapfile -d '' scripts < <(find scripts -name '*.sh' -print0)
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          for script in "${scripts[@]}"; do
            bash -n "${script}"
          done
          shellcheck "${scripts[@]}"

      - name: Build packages
        run: pnpm -r build

      - name: Seed eval gate reports
        run: |
          mkdir -p out/eval-matrix/reports
          cp packages/praecis/youtube/tests/fixtures/eval-matrix/baseline-report.json out/eval-matrix/reports/baseline.json
          cp packages/praecis/youtube/tests/fixtures/eval-matrix/baseline-report.json out/eval-matrix/reports/latest.json

      - name: Test packages
        run: pnpm test

      - name: Build docs
        run: pnpm docs:build
