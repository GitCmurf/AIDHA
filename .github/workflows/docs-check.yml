name: Docs Check

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements-docs.txt

      - name: Generate catalog
        run: python docs/_scripts/gen_catalog.py

      - name: Validate docs
        run: python docs/_scripts/validate_docs.py

      - name: Install markdownlint-cli
        run: |
          npm --version || (curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs)
          npm i -g markdownlint-cli

      - name: Markdownlint
        run: markdownlint "**/*.md" -c .markdownlint.json

      - name: MkDocs build
        run: mkdocs build --strict

